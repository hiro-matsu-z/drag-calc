<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>道路使用許可 管理 | 現場計算 PRO</title>
    <meta name="robots" content="noindex">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --blue: #00d4ff; --orange: #ff9500; --text: #e0e0e0; --border: #333; --danger: #ff4757; --success: #2ed573; --warning: #ffa502; --applied: #3498db; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 0 calc(100px + env(safe-area-inset-bottom)); line-height: 1.6; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: flex-start; border-left: 5px solid var(--orange); padding-left: 15px; margin-bottom: 20px; }
        header h1 { font-size: 1.3rem; margin: 0; color: white; }
        header p { font-size: 0.7rem; color: var(--orange); margin: 0; font-weight: bold; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .input-box { background: #2a2a2a; border: 2px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
        .input-box label { display: block; font-size: 0.75rem; color: var(--orange); font-weight: bold; margin-bottom: 5px; }
        .input-box input, .input-box select { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; font-family: sans-serif; }
        .input-box input::placeholder { color: #666; }
        .input-box input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .deadline-area { background: #1a1a1a; border: 1px dashed var(--border); padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; }
        .deadline-area p { margin: 0 0 5px 0; font-size: 0.8rem; color: #888; }
        .deadline-val { font-size: 1.3rem; font-weight: bold; color: var(--danger); }

        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ff9500, #cc7700); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .main-btn:active { transform: translateY(2px); }

        .dashboard-title { font-size: 1.1rem; color: white; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        
        .item-card { background: #2a2a2a; border-left: 6px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; position: relative; }
        .item-card.pending { border-left-color: var(--warning); background: #2d2618; }
        .item-card.pending-danger { border-left-color: var(--danger); background: #3a1c1c; }
        .item-card.applied { border-left-color: var(--applied); background: #1a2a3a; }
        .item-card.received { border-left-color: var(--success); background: #1a3320; }
        
        .item-name { font-weight: bold; font-size: 1.1rem; color: white; margin-bottom: 8px; padding-right: 85px; }
        .item-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; }
        .badge-pending { background: #443300; color: var(--warning); }
        .badge-danger { background: #550000; color: var(--danger); }
        .badge-applied { background: #003355; color: var(--applied); }
        .badge-received { background: #004411; color: var(--success); }
        .badge-auto { background: #000; color: #fff; border: 1px solid var(--orange); margin-left: 5px; }

        .item-details { font-size: 0.9rem; color: #ddd; line-height: 1.6; margin-bottom: 15px;}
        .highlight-text { font-size: 1.05rem; font-weight: bold; }

        /* カード右上のアクションボタン */
        .card-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; }
        .btn-mini { background: #121212; border: 1px solid #444; color: #aaa; padding: 5px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-mini:active { background: #333; }

        .status-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;}
        .btn-to-apply { background: var(--applied); color: white; }
        .btn-to-receive { background: var(--success); color: #000; }

        /* 編集モーダル */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: var(--card); width: 100%; max-width: 500px; border-radius: 12px; padding: 20px; border: 2px solid var(--orange); max-height: 90vh; overflow-y: auto; }
        .modal-header { font-weight: bold; font-size: 1.2rem; color: white; margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; display: flex; justify-content: space-between; }

        nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(12px); border-top: 1px solid #333; display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); height: calc(60px + env(safe-area-inset-bottom)); z-index: 1000; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; text-decoration: none; padding-top: 8px; transition: color 0.3s; }
        .nav-item .material-symbols-outlined { font-size: 24px; font-weight: 300; margin-bottom: 2px; }
        .nav-item span:last-child { font-size: 0.65rem; font-weight: 500; }
        .nav-item.active { color: var(--blue); }
        .nav-item.active .material-symbols-outlined { text-shadow: 0 0 12px rgba(0, 212, 255, 0.4); }
    </style>
</head>

<body>
<div class="container">
    <header>
        <div><h1>道路使用 管理</h1><p>更新忘れ防止・自動ループ申請対応</p></div>
    </header>

    <div class="card">
        <div class="input-box"><label>現場名</label><input type="text" id="site-name" placeholder="例: 〇〇邸 新築工事"></div>
        <div class="input-box"><label>現場住所</label><input type="text" id="site-address" placeholder="例: 荒川区町屋1-1" oninput="autoFillPolice()"></div>
        <div class="input-box" style="display:flex; gap:10px;">
            <div style="flex:2;"><label>管轄警察署</label><input type="text" id="police-station" placeholder="住所から推論"></div>
            <div style="flex:1;"><label>審査日数</label><input type="number" id="police-days" value="2" onchange="calculateDeadline()" style="text-align:center;"></div>
        </div>
        <div class="input-box"><label>許可取得 開始希望日</label><input type="date" id="start-date" onchange="calculateDeadline()"></div>
        <div class="input-box"><label>許可取得 終了日 (※自動更新に必須)</label><input type="date" id="end-date"></div>
        <div class="deadline-area">
            <p>警察署への申請期限目安 (土日除外)</p>
            <div id="deadline-display" class="deadline-val">未計算</div>
            <input type="hidden" id="deadline-date">
        </div>
        <button class="main-btn" onclick="saveData()">新規登録する</button>
    </div>

    <div class="dashboard-title"><span class="material-symbols-outlined">list_alt</span> 現場ステータス一覧</div>
    <div id="dashboard"></div>

    <div id="edit-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><span>現場データの編集</span><span class="material-symbols-outlined" style="cursor:pointer;" onclick="closeEdit()">close</span></div>
            <input type="hidden" id="edit-id">
            <div class="input-box"><label>現場名</label><input type="text" id="edit-name"></div>
            <div class="input-box"><label>現場住所</label><input type="text" id="edit-address"></div>
            <div class="input-box" style="display:flex; gap:10px;">
                <div style="flex:2;"><label>管轄警察署</label><input type="text" id="edit-police"></div>
                <div style="flex:1;"><label>審査日数</label><input type="number" id="edit-police-days" style="text-align:center;"></div>
            </div>
            <div class="input-box"><label>開始日</label><input type="date" id="edit-start"></div>
            <div class="input-box"><label>終了日</label><input type="date" id="edit-end"></div>
            <div class="input-box"><label>ステータス</label><select id="edit-status"><option value="pending">未申請</option><option value="applied">申請済</option><option value="received">許可取得済</option></select></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="main-btn" style="background:#444;" onclick="closeEdit()">キャンセル</button>
                <button class="main-btn" onclick="saveEdit()">保存する</button>
            </div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="nav-item"><span class="material-symbols-outlined">square_foot</span><span>対角</span></a>
        <a href="stair.html" class="nav-item"><span class="material-symbols-outlined">stairs</span><span>ポーチ</span></a>
        <a href="concrete.html" class="nav-item"><span class="material-symbols-outlined">water_drop</span><span>生コン</span></a>
        <a href="soil.html" class="nav-item"><span class="material-symbols-outlined">landscape</span><span>残土</span></a>
        <a href="road.html" class="nav-item active"><span class="material-symbols-outlined">edit_road</span><span>道路</span></a>
    </nav>
</div>

<script>
    const policeData = [
        { keywords: ["南千住"], name: "南千住警察署", days: 1 },
        { keywords: ["尾久", "西尾久", "東尾久"], name: "尾久警察署", days: 1 },
        { keywords: ["町屋", "荒川", "東日暮里", "西日暮里"], name: "荒川警察署", days: 2 },
        { keywords: ["田園調布"], name: "田園調布警察署", days: 1 },
        { keywords: ["区"], name: "管轄警察署要確認", days: 2 }
    ];

    function autoFillPolice() {
        const address = document.getElementById('site-address').value;
        const policeInput = document.getElementById('police-station');
        const daysInput = document.getElementById('police-days');
        let matched = false;
        for (let data of policeData) {
            if (data.keywords.some(kw => address.includes(kw))) {
                policeInput.value = data.name; daysInput.value = data.days; matched = true; break;
            }
        }
        if (!matched) daysInput.value = 2;
        calculateDeadline();
    }

    // 共通逆算ロジック (確実に開始日より前の日付を出す)
    function calcDeadlineLogic(startDateStr, middleDays) {
        if (!startDateStr) return "";
        let daysToSub = (parseInt(middleDays) || 2) + 1; // 中2日なら3日前
        let [y, m, d] = startDateStr.split('-');
        let date = new Date(y, m - 1, d);
        
        while (daysToSub > 0) {
            date.setDate(date.getDate() - 1);
            if (date.getDay() !== 0 && date.getDay() !== 6) daysToSub--;
        }
        const dy = date.getFullYear();
        const dm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${dy}-${dm}-${dd}`;
    }

    function calculateDeadline() {
        const start = document.getElementById('start-date').value;
        const days = document.getElementById('police-days').value;
        const display = document.getElementById('deadline-display');
        const hidden = document.getElementById('deadline-date');
        if (!start) { display.innerText = "未計算"; return; }
        const res = calcDeadlineLogic(start, days);
        display.innerText = `${res.split('-')[1]}月${res.split('-')[2]}日 までに提出`;
        hidden.value = res;
    }

    let roadDataList = JSON.parse(localStorage.getItem('roadPermitsPro')) || [];

    function saveData() {
        const name = document.getElementById('site-name').value;
        const start = document.getElementById('start-date').value;
        const deadline = document.getElementById('deadline-date').value;
        if (!name || !start) { alert("現場名と開始日は必須です"); return; }

        roadDataList.push({ 
            id: Date.now(), name, address: document.getElementById('site-address').value,
            start, end: document.getElementById('end-date').value, deadline,
            police: document.getElementById('police-station').value,
            policeDays: document.getElementById('police-days').value,
            status: 'pending'
        });
        localStorage.setItem('roadPermitsPro', JSON.stringify(roadDataList));
        location.reload();
    }

    function changeStatus(id, nextStatus) {
        const idx = roadDataList.findIndex(d => d.id === id);
        const data = roadDataList[idx];

        if (nextStatus === 'received') {
            if (!data.end) { alert("【終了日】を設定してください。次の申請を自動作成できません。"); openEdit(id); return; }
            
            // 次の現場を自動作成 (終了日の翌日開始)
            let [y, m, d] = data.end.split('-');
            let nextS = new Date(y, m - 1, d); nextS.setDate(nextS.getDate() + 1);
            const nSStr = `${nextS.getFullYear()}-${String(nextS.getMonth()+1).padStart(2,'0')}-${String(nextS.getDate()).padStart(2,'0')}`;
            
            roadDataList.push({
                id: Date.now() + 1, name: data.name, address: data.address,
                start: nSStr, end: '', deadline: calcDeadlineLogic(nSStr, data.policeDays),
                police: data.police, policeDays: data.policeDays, status: 'pending', isAuto: true
            });
            alert("次回の申請カードを自動作成しました！");
        }

        if (nextStatus === 'applied') {
            let date = new Date(); let wait = parseInt(data.policeDays) || 2;
            while(wait > 0) { date.setDate(date.getDate()+1); if(date.getDay()!==0 && date.getDay()!==6) wait--; }
            data.receiveDate = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }

        data.status = nextStatus;
        localStorage.setItem('roadPermitsPro', JSON.stringify(roadDataList));
        renderDashboard();
    }

    // --- 編集機能 ---
    function openEdit(id) {
        const d = roadDataList.find(x => x.id === id);
        document.getElementById('edit-id').value = d.id;
        document.getElementById('edit-name').value = d.name;
        document.getElementById('edit-address').value = d.address;
        document.getElementById('edit-police').value = d.police;
        document.getElementById('edit-police-days').value = d.policeDays;
        document.getElementById('edit-start').value = d.start;
        document.getElementById('edit-end').value = d.end;
        document.getElementById('edit-status').value = d.status;
        document.getElementById('edit-modal').style.display = 'flex';
    }
    function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
    function saveEdit() {
        const id = parseInt(document.getElementById('edit-id').value);
        const idx = roadDataList.findIndex(x => x.id === id);
        const start = document.getElementById('edit-start').value;
        const days = document.getElementById('edit-police-days').value;
        
        roadDataList[idx] = { ...roadDataList[idx],
            name: document.getElementById('edit-name').value,
            address: document.getElementById('edit-address').value,
            police: document.getElementById('edit-police').value,
            policeDays: days, start, end: document.getElementById('edit-end').value,
            status: document.getElementById('edit-status').value,
            deadline: calcDeadlineLogic(start, days)
        };
        localStorage.setItem('roadPermitsPro', JSON.stringify(roadDataList));
        closeEdit(); renderDashboard();
    }

    function deleteData(id) { if(confirm("削除しますか？")) { roadDataList = roadDataList.filter(x => x.id !== id); localStorage.setItem('roadPermitsPro', JSON.stringify(roadDataList)); renderDashboard(); } }

    function renderDashboard() {
        const board = document.getElementById('dashboard'); board.innerHTML = '';
        roadDataList.sort((a,b) => new Date(a.status==='applied'?a.receiveDate:a.deadline) - new Date(b.status==='applied'?b.receiveDate:b.deadline));
        const today = new Date(); today.setHours(0,0,0,0);

        roadDataList.forEach(data => {
            const action = `<div class="card-actions"><button class="btn-mini" onclick="openEdit(${data.id})"><span class="material-symbols-outlined" style="font-size:18px;">edit</span></button><button class="btn-mini" style="color:var(--danger);" onclick="deleteData(${data.id})"><span class="material-symbols-outlined" style="font-size:18px;">delete</span></button></div>`;
            
            if (data.status === 'pending') {
                const diff = Math.ceil((new Date(data.deadline) - today) / 86400000);
                const isUrgent = diff < 0;
                board.innerHTML += `<div class="item-card ${isUrgent?'pending-danger':'pending'}">${action}<div class="item-name">${data.name}</div><div class="item-badge ${isUrgent?'badge-danger':'badge-pending'}">${isUrgent?'🚨 期限超過':`⚠️ あと ${diff} 日`}</div>${data.isAuto?'<span class="item-badge badge-auto">自動更新</span>':''}<div class="item-details">期限: <span class="highlight-text" style="color:var(--danger);">${data.deadline}</span><br>開始日: ${data.start}</div><button class="status-btn btn-to-apply" onclick="changeStatus(${data.id}, 'applied')">申請完了</button></div>`;
            } else if (data.status === 'applied') {
                board.innerHTML += `<div class="item-card applied">${action}<div class="item-name">${data.name}</div><div class="item-badge badge-applied">🎫 受取待ち</div><div class="item-details">受取目安: <span class="highlight-text" style="color:var(--blue);">${data.receiveDate} 以降</span><br>開始日: ${data.start}</div><button class="status-btn btn-to-receive" onclick="changeStatus(${data.id}, 'received')">受取完了</button></div>`;
            } else if (data.status === 'received') {
                board.innerHTML += `<div class="item-card received">${action}<div class="item-name">${data.name}</div><div class="item-badge badge-received">✅ 許可取得済</div><div class="item-details"><span class="highlight-text" style="color:var(--success);">期間: ${data.start} 〜 ${data.end || '未設定'}</span></div></div>`;
            }
        });
    }
    renderDashboard();
</script>
</body>
</html>
